  <!-- Left Side: Main Content (White background) -->
  <!-- Section Title -->
  <rect x="10" y="45" width="30" height="4" rx="1" fill="var(--preview-primary, #2C2D30)" />
  <line x1="10" y1="51" x2="60" y2="51" stroke="var(--preview-accent, #C9A227)" stroke-width="1" />
  
  <!-- Content Lines -->
  <rect x="10" y="56" width="50" height="2" rx="0.5" fill="#e2e8f0" />
