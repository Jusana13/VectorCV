  <rect x="75" y="80" width="15" height="2" rx="0.5" fill="#ffffff" opacity="0.6" />
  <rect x="75" y="84" width="18" height="2" rx="0.5" fill="#ffffff" opacity="0.6" />
  <rect x="75" y="88" width="12" height="2" rx="0.5" fill="#ffffff" opacity="0.6" />
  
