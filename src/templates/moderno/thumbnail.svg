  <circle cx="78" cy="54" r="2" fill="#ffffff" opacity="0.6" />
  <rect x="83" y="53" width="18" height="2" rx="0.5" fill="#ffffff" opacity="0.6" />
  <circle cx="78" cy="61" r="2" fill="#ffffff" opacity="0.6" />
  <rect x="83" y="60" width="18" height="2" rx="0.5" fill="#ffffff" opacity="0.6" />
  
