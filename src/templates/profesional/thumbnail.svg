<svg viewBox="0 0 110 155" fill="none" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; border-radius:4px; width:100%; height:100%;">
  <!-- Left accent stripe (Full height dark blue) -->
  <rect x="0" y="0" width="5" height="155" fill="#0b1726" />

  <!-- Header (From x=5 to end) -->
  <rect x="5" y="0" width="105" height="35" fill="var(--preview-primary, #1b2a4a)" />

  <!-- Name lines in Header -->
  <rect x="12" y="10" width="45" height="5" rx="1" fill="#ffffff" />
  <rect x="12" y="18" width="28" height="4" rx="1" fill="var(--preview-accent, #e8a838)" />

  <!-- Photo in Header (Square rounded) -->
  <rect x="83" y="6" width="20" height="22" rx="2" fill="#ffffff" stroke="var(--preview-accent, #e8a838)" stroke-width="1" />

  <!-- Left Main Content -->
  <!-- Section Title 1 (Left bordered gold) -->
  <rect x="11" y="44" width="2" height="7" fill="var(--preview-accent, #e8a838)" />
  <rect x="16" y="45" width="25" height="4" rx="1" fill="var(--preview-primary, #1b2a4a)" />

  <!-- Content items -->
  <rect x="16" y="55" width="30" height="3" rx="0.5" fill="var(--preview-primary, #1b2a4a)" />
  <rect x="16" y="60" width="45" height="2" rx="0.5" fill="#e2e8f0" />
  <rect x="16" y="64" width="40" height="2" rx="0.5" fill="#e2e8f0" />

  <!-- Section Title 2 (Left bordered gold) -->
  <rect x="11" y="74" width="2" height="7" fill="var(--preview-accent, #e8a838)" />
  <rect x="16" y="75" width="30" height="4" rx="1" fill="var(--preview-primary, #1b2a4a)" />

  <!-- Experience items -->
  <rect x="16" y="85" width="35" height="3" rx="0.5" fill="var(--preview-primary, #1b2a4a)" />
  <rect x="16" y="90" width="48" height="2" rx="0.5" fill="#e2e8f0" />
  <rect x="16" y="94" width="48" height="2" rx="0.5" fill="#e2e8f0" />
  <rect x="16" y="98" width="25" height="2" rx="0.5" fill="#e2e8f0" />

  <!-- Section Title 3 (Left bordered gold) -->
  <rect x="11" y="109" width="2" height="7" fill="var(--preview-accent, #e8a838)" />
  <rect x="16" y="110" width="32" height="4" rx="1" fill="var(--preview-primary, #1b2a4a)" />

  <rect x="16" y="120" width="35" height="3" rx="0.5" fill="var(--preview-primary, #1b2a4a)" />
  <rect x="16" y="125" width="45" height="2" rx="0.5" fill="#e2e8f0" />
  <rect x="16" y="129" width="38" height="2" rx="0.5" fill="#e2e8f0" />

  <!-- Right Sidebar (Light background, from x=72) -->
  <rect x="72" y="35" width="38" height="120" fill="#f4f6f8" />
  <line x1="72" y1="35" x2="72" y2="155" stroke="#e1e4e8" stroke-width="1" />

  <!-- Sidebar Content -->
  <!-- Contact Title -->
  <rect x="76" y="44" width="2" height="6" fill="var(--preview-accent, #e8a838)" />
  <rect x="80" y="45" width="18" height="3" rx="0.5" fill="var(--preview-primary, #1b2a4a)" />
  <rect x="76" y="53" width="30" height="2" rx="0.5" fill="#a0aec0" />
  <rect x="76" y="58" width="30" height="2" rx="0.5" fill="#a0aec0" />
  <rect x="76" y="63" width="30" height="2" rx="0.5" fill="#a0aec0" />

  <!-- Skills Title -->
  <rect x="76" y="74" width="2" height="6" fill="var(--preview-accent, #e8a838)" />
  <rect x="80" y="75" width="18" height="3" rx="0.5" fill="var(--preview-primary, #1b2a4a)" />
  <rect x="76" y="83" width="12" height="2" rx="0.5" fill="#718096" />
  <rect x="76" y="87" width="18" height="2" rx="0.5" fill="#718096" />
  <rect x="76" y="91" width="15" height="2" rx="0.5" fill="#718096" />

  <!-- Languages Title -->
  <rect x="76" y="104" width="2" height="6" fill="var(--preview-accent, #e8a838)" />
  <rect x="80" y="105" width="18" height="3" rx="0.5" fill="var(--preview-primary, #1b2a4a)" />
  
  <!-- Mini Progress Circles -->
  <circle cx="83" cy="118" r="4" stroke="#cbd5e0" stroke-width="1" fill="none" />
  <circle cx="83" cy="118" r="4" stroke="var(--preview-primary, #1b2a4a)" stroke-width="1" stroke-dasharray="25.1" stroke-dashoffset="8" fill="none" />
  
  <circle cx="95" cy="118" r="4" stroke="#cbd5e0" stroke-width="1" fill="none" />
  <circle cx="95" cy="118" r="4" stroke="var(--preview-primary, #1b2a4a)" stroke-width="1" stroke-dasharray="25.1" stroke-dashoffset="6" fill="none" />
</svg>
