<svg viewBox="0 0 110 155" fill="none" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff; border-radius:4px; width:100%; height:100%;">
  <!-- Page Background (White) -->
  <rect x="0" y="0" width="110" height="155" fill="#ffffff" />

  <!-- Left Column Area (White default, just placeholder) -->
  <rect x="0" y="0" width="44" height="135" fill="#ffffff" />

  <!-- Curved Photo Background (Primary color) -->
  <path d="M0 0 H44 V37 C44 47 34 52 24 52 H0 Z" fill="var(--preview-primary, #2A398A)" />

  <!-- Photo (White background avatar area) -->
  <path d="M0 0 H41 V34 C41 43 32 47 22 47 H0 Z" fill="#ffffff" />

  <!-- Silhouette SVG Person (Dynamic primary color with opacity watermark) -->
  <path d="M12 28 C14.5 28 16.5 26 16.5 23.5 C16.5 21 14.5 19 12 19 C9.5 19 7.5 21 7.5 23.5 C7.5 26 9.5 28 12 28 Z M12 30 C9 30 3 31.5 3 34.5 V36.5 H21 V34.5 C21 31.5 15 30 12 30 Z" fill="var(--preview-primary, #2A398A)" opacity="0.25" transform="translate(8.5, 4)" />

  <!-- Name Bold in Left Col -->
  <rect x="6" y="60" width="30" height="5.5" rx="0.5" fill="var(--preview-primary, #2A398A)" />
  <rect x="6" y="67" width="22" height="5.5" rx="0.5" fill="var(--preview-primary, #2A398A)" />

  <!-- Job Title -->
  <rect x="10" y="77" width="22" height="2.5" rx="0.3" fill="var(--preview-primary, #2A398A)" opacity="0.9" />
  <line x1="7" y1="76" x2="7" y2="81" stroke="var(--preview-primary, #2A398A)" stroke-width="0.8" />

  <!-- About Me Title -->
  <rect x="6" y="88" width="26" height="3.5" rx="0.5" fill="var(--preview-primary, #2A398A)" />
  <!-- About Me Lines -->
  <rect x="6" y="95" width="32" height="1.5" rx="0.3" fill="var(--preview-primary, #2A398A)" opacity="0.6" />
  <rect x="6" y="98" width="28" height="1.5" rx="0.3" fill="var(--preview-primary, #2A398A)" opacity="0.6" />
  <rect x="6" y="101" width="30" height="1.5" rx="0.3" fill="var(--preview-primary, #2A398A)" opacity="0.6" />

  <!-- Right Column (Primary color background) -->
  <rect x="44" y="0" width="66" height="135" fill="var(--preview-primary, #2A398A)" />

  <!-- Timeline Line (Centered vertically on the 5 icons) -->
  <line x1="53" y1="16" x2="53" y2="114" stroke="#ffffff" stroke-width="0.6" opacity="0.8" />

  <!-- Block 1: Formación (Card Light) -->
  <rect x="60" y="6" width="44" height="20" rx="2" fill="var(--preview-cardLight, #485CB8)" />
  <!-- Icon 1 on Timeline -->
  <circle cx="53" cy="16" r="3" fill="var(--preview-primary, #2A398A)" stroke="var(--preview-accent, #D1F2B6)" stroke-width="0.8" />
  <!-- Card 1 Content -->
  <rect x="65" y="10" width="22" height="1.5" rx="0.3" fill="#ffffff" />
  <rect x="65" y="14" width="34" height="1" rx="0.3" fill="#ffffff" opacity="0.7" />
  <rect x="65" y="17" width="26" height="1" rx="0.3" fill="#ffffff" opacity="0.7" />

  <!-- Block 2: Experiencia (Accent Card) -->
  <rect x="60" y="31" width="44" height="22" rx="2" fill="var(--preview-accent, #D1F2B6)" />
  <!-- Icon 2 on Timeline -->
  <circle cx="53" cy="41" r="3" fill="var(--preview-primary, #2A398A)" stroke="var(--preview-accent, #D1F2B6)" stroke-width="0.8" />
  <!-- Card 2 Content -->
  <rect x="65" y="35" width="24" height="1.5" rx="0.3" fill="var(--preview-primary, #2A398A)" />
  <rect x="65" y="39" width="34" height="1" rx="0.3" fill="var(--preview-primary, #2A398A)" opacity="0.7" />
  <rect x="65" y="42" width="28" height="1" rx="0.3" fill="var(--preview-primary, #2A398A)" opacity="0.7" />

  <!-- Block 3: Conocimientos (Card Dark) -->
  <rect x="60" y="58" width="44" height="20" rx="2" fill="var(--preview-cardDark, #37489A)" />
  <!-- Icon 3 on Timeline -->
  <circle cx="53" cy="68" r="3" fill="var(--preview-primary, #2A398A)" stroke="var(--preview-accent, #D1F2B6)" stroke-width="0.8" />
  <!-- Card 3 Content -->
  <rect x="65" y="62" width="20" height="1.5" rx="0.3" fill="#ffffff" />
  <circle cx="66" cy="68" r="0.6" fill="#ffffff" />
  <rect x="69" y="67.5" width="24" height="1" fill="#ffffff" opacity="0.7" />
  <circle cx="66" cy="71" r="0.6" fill="#ffffff" />
  <rect x="69" y="70.5" width="28" height="1" fill="#ffffff" opacity="0.7" />

  <!-- Block 4: Habilidades (Card Dark) -->
  <rect x="60" y="83" width="44" height="20" rx="2" fill="var(--preview-cardDark, #37489A)" />
  <!-- Icon 4 on Timeline -->
  <circle cx="53" cy="93" r="3" fill="var(--preview-primary, #2A398A)" stroke="var(--preview-accent, #D1F2B6)" stroke-width="0.8" />
  <!-- Card 4 Content -->
  <rect x="65" y="87" width="20" height="1.5" rx="0.3" fill="#ffffff" />
  <circle cx="66" cy="93" r="0.6" fill="#ffffff" />
  <rect x="69" y="92.5" width="22" height="1" fill="#ffffff" opacity="0.7" />
  <circle cx="66" cy="96" r="0.6" fill="#ffffff" />
  <rect x="69" y="95.5" width="26" height="1" fill="#ffffff" opacity="0.7" />

  <!-- Block 5: Idiomas (Card Dark) -->
  <rect x="60" y="108" width="44" height="20" rx="2" fill="var(--preview-cardDark, #37489A)" />
  <!-- Icon 5 on Timeline -->
  <circle cx="53" cy="118" r="3" fill="var(--preview-primary, #2A398A)" stroke="var(--preview-accent, #D1F2B6)" stroke-width="0.8" />
  <!-- Card 5 Content -->
  <rect x="65" y="112" width="16" height="1.5" rx="0.3" fill="#ffffff" />
  <rect x="65" y="117" width="34" height="2" rx="1" fill="var(--preview-primary, #2A398A)" />
  <rect x="65" y="117" width="26" height="2" rx="1" fill="var(--preview-accent, #D1F2B6)" />

  <!-- Footer Area (Primary color) -->
  <rect x="0" y="135" width="110" height="20" fill="var(--preview-primary, #2A398A)" />
  <!-- Divider -->
  <line x1="6" y1="138" x2="104" y2="138" stroke="#ffffff" stroke-width="0.5" opacity="0.8" />
  <!-- Contact Icons/Dots -->
  <circle cx="16" cy="146" r="2.2" fill="#ffffff" stroke="var(--preview-accent, #D1F2B6)" stroke-width="0.5" />
  <circle cx="39" cy="146" r="2.2" fill="#ffffff" stroke="var(--preview-accent, #D1F2B6)" stroke-width="0.5" />
  <circle cx="62" cy="146" r="2.2" fill="#ffffff" stroke="var(--preview-accent, #D1F2B6)" stroke-width="0.5" />
  <circle cx="85" cy="146" r="2.2" fill="#ffffff" stroke="var(--preview-accent, #D1F2B6)" stroke-width="0.5" />
  <!-- Text placeholding lines next to dots -->
  <rect x="21" y="145" width="12" height="1.5" rx="0.3" fill="#ffffff" opacity="0.9" />
  <rect x="44" y="145" width="12" height="1.5" rx="0.3" fill="#ffffff" opacity="0.9" />
  <rect x="67" y="145" width="12" height="1.5" rx="0.3" fill="#ffffff" opacity="0.9" />
  <rect x="90" y="145" width="12" height="1.5" rx="0.3" fill="#ffffff" opacity="0.9" />
</svg>
